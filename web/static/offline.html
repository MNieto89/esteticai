<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - Esteticai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdf0f4;
            color: #2d2d2d;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .offline-icon { font-size: 48px; margin-bottom: 16px; }
        h2 { color: #c4748e; margin-bottom: 12px; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            background: #e8a0b4;
            color: white;
        }
        .btn:hover { background: #c4748e; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h2>Sin conexión</h2>
        <p>No tienes conexión a internet en este momento. Comprueba tu conexión e inténtalo de nuevo.</p>
        <button class="btn" onclick="window.location.reload()">Reintentar</button>
    </div>
</body>
</html>
