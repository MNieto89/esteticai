<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Esteticai - Genera contenido profesional para redes sociales con IA. Copys, im&aacute;genes, videos y calendarios para tu negocio de est&eacute;tica.{% endblock %}">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="{% block og_title %}Esteticai - IA para profesionales de la est&eacute;tica{% endblock %}">
    <meta property="og:description" content="Genera copys, im&aacute;genes, videos y calendarios para tu negocio de est&eacute;tica con inteligencia artificial.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://esteticai.com/static/og-image.svg">
    <meta property="og:locale" content="es_ES">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Esteticai - IA para profesionales de la estética">
    <meta name="twitter:description" content="Genera copys, imágenes, videos y calendarios para tu negocio de estética con inteligencia artificial.">
    <meta name="twitter:image" content="https://esteticai.com/static/og-image.svg">
    <link rel="canonical" href="https://esteticai.com">
    <link rel="preconnect" href="https://fal.run" crossorigin>
    <link rel="preconnect" href="https://js.stripe.com" crossorigin>
    <link rel="dns-prefetch" href="https://fal.run">
    <link rel="dns-prefetch" href="https://js.stripe.com">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#e86586">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}Esteticai{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>
    {% block nav %}{% endblock %}
    <main id="main-content" role="main">
        {% block content %}{% endblock %}
    </main>
    <!-- Cookie banner -->
    <div class="cookie-banner" id="cookie-banner" style="display:none;" role="alert" aria-live="polite">
        <span>Usamos cookies esenciales para que la plataforma funcione. <a href="/cookies">M&aacute;s info</a></span>
        <button class="btn btn-primary btn-sm" onclick="aceptarCookies()">Aceptar</button>
    </div>
    <script src="/static/js/app.js"></script>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}</script>
    {% block scripts %}{% endblock %}
</body>
</html>
