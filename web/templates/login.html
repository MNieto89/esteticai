{% extends "base.html" %}
{% block title %}Iniciar sesi&oacute;n - Esteticai{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Iniciar sesi&oacute;n</h2>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contrase&ntilde;a</label>
                <input type="password" id="password" name="password" required placeholder="Tu contrase&ntilde;a">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>
        <p class="auth-link"><a href="/recuperar">&iquest;Olvidaste tu contrase&ntilde;a?</a></p>
        <p class="auth-link">&iquest;No tienes cuenta? <a href="/registro">Reg&iacute;strate</a></p>
    </div>
</div>
{% endblock %}
