{% extends "base.html" %}
{% block title %}Registro - Esteticai{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Crear cuenta</h2>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/registro">
            <div class="form-group">
                <label for="nombre">Tu nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Laura Martinez">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contrasena</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Minimo 6 caracteres">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
        </form>
        <p class="auth-link">Ya tienes cuenta? <a href="/login">Inicia sesion</a></p>
    </div>
</div>
{% endblock %}
