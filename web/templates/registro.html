{% extends "base.html" %}
{% block title %}Registro - Esteticai{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Crear cuenta</h2>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/registro">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="nombre">Tu nombre</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Laura Mart&iacute;nez">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label for="password">Contrase&ntilde;a</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="M&iacute;nimo 6 caracteres" oninput="evaluarPassword(this.value)">
                <div class="password-strength" id="password-strength" style="display:none;">
                    <div class="password-bar"><div class="password-fill" id="password-fill"></div></div>
                    <span class="password-label" id="password-label"></span>
                </div>
            </div>
            <div class="form-group">
                <label class="checkbox-label" style="font-size:13px; color:var(--gris);">
                    <input type="checkbox" name="acepta_privacidad" required>
                    Acepto la <a href="/privacidad" target="_blank">pol&iacute;tica de privacidad</a> y las <a href="/legal" target="_blank">condiciones de uso</a>
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
        </form>
        <p class="auth-link">&iquest;Ya tienes cuenta? <a href="/login">Inicia sesi&oacute;n</a></p>
    </div>
</div>
{% endblock %}
