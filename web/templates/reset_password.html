{% extends "base.html" %}
{% block title %}Nueva contrase&ntilde;a - Esteticai{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Crear nueva contrase&ntilde;a</h2>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/reset/{{ token }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="password">Nueva contrase&ntilde;a</label>
                <input type="password" id="password" name="password" required
                       placeholder="M&iacute;nimo 6 caracteres" minlength="6" oninput="evaluarPassword(this.value)">
                <div class="password-strength" id="password-strength" style="display:none;">
                    <div class="password-bar"><div class="password-fill" id="password-fill"></div></div>
                    <span class="password-label" id="password-label"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="password2">Repetir contrase&ntilde;a</label>
                <input type="password" id="password2" required
                       placeholder="Repite la contrase&ntilde;a" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Cambiar contrase&ntilde;a</button>
        </form>
        <p class="auth-link"><a href="/login">Volver a iniciar sesi&oacute;n</a></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('password2').value;
    if (p1 !== p2) {
        e.preventDefault();
        alert('Las contrase\u00f1as no coinciden');
    }
});
</script>
{% endblock %}
